; Manual Técnico PUI — Solución tecnológica instituciones diversas v1.0 (13/01/2026). No versionar secretos.

PUI_PUBLIC_BASE                 = /api/pui

PUI_MOCK_MODE = 1
PUI_INTEGRATION_MODE = mock

; RFC de la institución (homoclave) — obligatorio para payloads salientes §7.2 y §7.3
INSTITUCION_RFC                 = CUL123456789

PUI_OUTBOUND_BASE_URL           = https://pui.example.mx
PUI_OUTBOUND_TOKEN              = CHANGE_ME_REAL_TOKEN
PUI_PATH_NOTIFICAR_COINCIDENCIA = /notificar-coincidencia
PUI_PATH_BUSQUEDA_FINALIZADA    = /busqueda-finalizada
PUI_HTTP_RETRIES                = 3
PUI_HTTP_RETRY_MS               = 100
PUI_REMOTE_TIMEOUT_MS           = 15000
PUI_ABORT_ON_NOTIFY_FAIL        = 0

; §8.1 — usuario fijo "PUI"; clave 16–20 con mayúscula, dígito y especial (!@#$%^&*()\-_.+)
JWT_SECRET                      = cultiva_pui_dev_secret_2026_seguro_32_chars_min
JWT_EXPIRES_SECONDS             = 3600
JWT_ISSUER                      = cultiva-pui
JWT_AUDIENCE                    = pui-institucion
PUI_LOGIN_USUARIO               = PUI
PUI_LOGIN_CLAVE                 = "Aa1!aaaaaaaaaaaaaa"

PUI_LOG_PREFIX                  = [PUI]
PUI_E2E_ENABLE                  = 0
; Trazabilidad de resolución de config en error_log (1=activo)
PUI_DEBUG_CONFIG                = 0
; Endpoints auxiliares (debug/monitoreo), no parte del flujo oficial
PUI_ENABLE_AUX_PERSONA          = 1
PUI_ENABLE_AUX_BUSQUEDA         = 1
PUI_STRICT_REAL_MODE            = 0
PUI_RATE_LIMIT_ENABLED          = 1
PUI_RATE_LIMIT_MAX_REQUESTS     = 60
PUI_RATE_LIMIT_WINDOW_SECONDS   = 60

; Expresión Oracle: timestamp de actividad del cliente en CL (fases 2 ventana y fase 3 incremental).
; Esquema real: MODIFICA / ALTA (no FECHA_*).
PUI_CL_ACTIVIDAD_TIMESTAMP_EXPR = "NVL(CL.MODIFICA, CL.ALTA)"

; Errores JSON: 0 = mensajes genéricos (§10); 1 = detalle de validación en cliente (solo desarrollo)
PUI_VERBOSE_CLIENT_ERRORS       = 0
; 0 deshabilita POST /activar-reporte-prueba (403)
PUI_ENABLE_ACTIVAR_PRUEBA       = 1
; GET previo a activar prueba: ruta bajo PUI_OUTBOUND_BASE_URL (vacío = raíz)
PUI_OUTBOUND_PING_PATH          =
PUI_OUTBOUND_PING_TIMEOUT_MS    = 5000
