; Copiar a App/config/pui.ini. Manual Técnico PUI v1.0 (13/01/2026).

PUI_PUBLIC_BASE                 = /api/pui

PUI_MOCK_MODE = 1
PUI_INTEGRATION_MODE = mock

; RFC institución — payloads salientes §7.2 y §7.3 (debe coincidir con el login hacia la PUI / simulador).
; Simulador de pruebas suele usar XAXX010101000; si difiere de su entorno, puede enviar institucion_id en POST /activar-reporte.
;
; El log "tiempo real" del simulador muestra peticiones AL simulador (p. ej. /admin/activar-reporte).
; POST /busqueda-finalizada en ese log solo aparece cuando SU servidor institucional hace HTTP saliente
; a PUI_OUTBOUND_BASE_URL (la PUI recibe la notificación §7.3). Debe configurar en el simulador la URL
; pública de POST .../api/pui/activar-reporte hacia su Cultiva.
INSTITUCION_RFC                 =

PUI_OUTBOUND_BASE_URL           =
;
; --- Autenticación HTTP saliente (§7.2 / §7.3 hacia la PUI o simulador) ---
; El simulador de pruebas NO acepta la "clave" ni un token fijo arbitrario como Authorization: Bearer.
; Flujo obligatorio: 1) POST {base}/login con JSON (institucion_id+clave o usuario+clave)
;                   2) Leer el JWT de la respuesta (token / access_token)
;                   3) Enviar notificar-coincidencia y busqueda-finalizada con Bearer <ese JWT>.
; Configure PUI_OUTBOUND_AUTH_MODE=login y PUI_OUTBOUND_LOGIN_*; deje PUI_OUTBOUND_TOKEN vacío o no lo use como Bearer.
; Nota: JWT_SECRET en Simulador/.env es SOLO del simulador (firma/verifica JWT allí). NO va en pui.ini para salientes.
; La clave que debe coincidir con PUI_CLAVE_ESPERADA del simulador es PUI_OUTBOUND_LOGIN_CLAVE (p. ej. simulador_PUI_26).
;
; Si PUI_OUTBOUND_BASE_URL es demo-pui.adssivo.mx o localhost/127.0.0.1, el código fuerza JWT (POST /login) aunque AUTH_MODE=static.
;
; --- Simulador en carpeta Simulador/ (node server.js, PORT en Simulador/.env, HTTP sin TLS) ---
; Empresa N en .env debe apuntar a su API, p. ej. EMPRESA_2_API_URL=http://localhost:8080/api/pui y EMPRESA_2_API_CLAVE = misma que PUI_LOGIN_CLAVE aquí.
; Saliente hacia el simulador (notificar / busqueda-finalizada):
;   PUI_OUTBOUND_BASE_URL           = http://127.0.0.1:8443/
;   PUI_OUTBOUND_AUTH_MODE          = login
;   PUI_OUTBOUND_LOGIN_PATH         = /login
;   PUI_OUTBOUND_LOGIN_BODY_STYLE   = usuario
;   PUI_OUTBOUND_LOGIN_USUARIO      = PUI
;   PUI_OUTBOUND_LOGIN_CLAVE        = simulador_PUI_26
;
; Producción con Bearer estático acordado con la PUI: PUI_OUTBOUND_AUTH_MODE=static y PUI_OUTBOUND_TOKEN.
PUI_OUTBOUND_AUTH_MODE          = static
;PUI_OUTBOUND_LOGIN_PATH         = /login
;PUI_OUTBOUND_LOGIN_INSTITUCION_ID = XAXX010101000
;PUI_OUTBOUND_LOGIN_USUARIO      = PUI
;PUI_OUTBOUND_LOGIN_CLAVE        =
;PUI_OUTBOUND_LOGIN_BODY_STYLE   = auto
;PUI_OUTBOUND_LOGIN_CACHE_SECONDS = 3300
; Margen antes del exp del JWT para renovar caché (evita 401 por token expirado en salientes)
;PUI_OUTBOUND_LOGIN_EXPIRY_MARGIN_SECONDS = 120
PUI_OUTBOUND_TOKEN              =
; Opcionales (solo modo static): Bearer distinto por endpoint (vacío = PUI_OUTBOUND_TOKEN)
;PUI_OUTBOUND_TOKEN_NOTIFICAR           =
;PUI_OUTBOUND_TOKEN_BUSQUEDA_FINALIZADA =
PUI_PATH_NOTIFICAR_COINCIDENCIA = /notificar-coincidencia
PUI_PATH_BUSQUEDA_FINALIZADA    = /busqueda-finalizada
PUI_HTTP_RETRIES                = 3
PUI_HTTP_RETRY_MS               = 100
PUI_REMOTE_TIMEOUT_MS           = 15000
PUI_ABORT_ON_NOTIFY_FAIL        = 0

; §8.1 — JWT y login institucional
JWT_SECRET                      =
JWT_EXPIRES_SECONDS             = 3600
JWT_ISSUER                      = cultiva-pui
JWT_AUDIENCE                    = pui-institucion
PUI_LOGIN_USUARIO               = PUI
PUI_LOGIN_CLAVE                 =

PUI_LOG_PREFIX                  = [PUI]
PUI_E2E_ENABLE                  = 0
PUI_DEBUG_CONFIG                = 0
; 1 = en CultivaClienteRepository loguea query SQL y parámetros (trazabilidad EVENTO/CLIENTE)
PUI_SQL_DEBUG                   = 0
; 1 = primera conexión Oracle por proceso: USER, CURRENT_SCHEMA, COUNT(EVENTO) calificado y sin calificar (mismo esquema que el backend)
PUI_DB_SESSION_DEBUG            = 0
PUI_ENABLE_AUX_PERSONA          = 1
PUI_ENABLE_AUX_BUSQUEDA         = 1
PUI_STRICT_REAL_MODE            = 0
PUI_RATE_LIMIT_ENABLED          = 1
PUI_RATE_LIMIT_MAX_REQUESTS     = 60
PUI_RATE_LIMIT_WINDOW_SECONDS   = 60

PUI_CL_ACTIVIDAD_TIMESTAMP_EXPR = "NVL(CL.MODIFICA, CL.ALTA)"

; Esquema Oracle de PUI.CLIENTE / PUI.EVENTO (ALL_TAB_COLUMNS). Vacío o ausente = PUI (calificación fija, sin depender del sinónimo de sesión).
; PUI_PADRON_SCHEMA = PUI

PUI_VERBOSE_CLIENT_ERRORS       = 0
PUI_ENABLE_ACTIVAR_PRUEBA       = 1
; GET …/test-login-simulador — diagnóstico (variantes A/B login saliente); 1 solo en entornos de prueba
PUI_ENABLE_TEST_LOGIN_SIMULADOR = 0
PUI_OUTBOUND_PING_PATH          =
PUI_OUTBOUND_PING_TIMEOUT_MS    = 5000
